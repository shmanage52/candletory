<!DOCTYPE html>
<html lang="fa">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forex Widget <br> By Candletory Co</title><br>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif, sans-serif;
            background: linear-gradient(120deg, #001f3f, #003b8b, #0057bf);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .widget-container {
            width: 90%;
            height: fit-content;
            max-width: 600px;
            margin: 20px auto;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .widget {
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
        }

        @media (max-width: 768px) {
            .widget {
                height: 400px;
            }
        }
    </style>
</head>

<body>
    <h1
        style="text-align-last: center ;font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif; -webkit-text-size-adjust: auto;">
    </h1>
    Forex Widgets <br>Candletory Co</h1>

    <div class="widget-container">
        <div class="widget"> <!-- Session Status -->
            <!-- myfxbook.com Market Hours Widget - Start -->
            <iframe src="https://widget.myfxbook.com/widget/market-hours.html"
                style="border: 0; width:100%; height:100%;"></iframe>
            <div style="margin-top: 10px;">
                <div
                    style="width: fit-content; margin: auto;font-family: roboto,sans-serif!important; font-size: 13px; color: #666666;">
                    <a href="https://www.myfxbook.com/market-hours" title="Forex Market Hours" class="myfxbookLink"
                        target="_blank" rel="noopener"><b style="color:#666666">
                </div>
            </div>
            <!-- myfxbook.com Market Hours Widget - End -->
        </div>
        
        <div class="widget"> <!-- Economic Calender -->

            <!-- myfxbook.com Economic Calendar Widget - Start -->
            <iframe
                src="https://widget.myfxbook.com/widget/calendar.html?lang=en&impacts=0,1,2,3&symbols=AED,CAD,EUR,GBP,IRR,JPY,NZD,TRY,USD"
                style="border: 0; width:100%; height:100%;"></iframe>
            <div style="margin-top: 10px;">
                <div
                    style="width: fit-content; margin: auto;font-family: roboto,sans-serif!important; font-size: 13px; color: #666666;">
                    <a href="https://www.myfxbook.com/forex-economic-calendar?utm_source=widget13&utm_medium=link&utm_campaign=copyright"
                        title="Economic Calendar" class="myfxbookLink" target="_blank" rel="noopener"><b
                            style="color:#666666"></b></a>
                </div>
            </div>
            <!-- myfxbook.com Economic Calendar Widget - End -->

        </div>
    </div>
</body>

</html>
